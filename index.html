<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>My Workout</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#fff;font-family:"Barlow Condensed",sans-serif;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
#hdr{position:sticky;top:0;z-index:100;padding:env(safe-area-inset-top,0px) 16px 14px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:border-color .3s,background .3s}
#hdr-in{max-width:660px;margin:0 auto;padding-top:12px}
.tagrow{display:flex;align-items:baseline;gap:10px;margin-bottom:3px}
.tag{font-size:10px;letter-spacing:4px;font-weight:700;text-transform:uppercase;transition:color .3s}
.sub{font-size:10px;letter-spacing:2px;color:#444}
h1{font-size:clamp(17px,5vw,30px);font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1.05}
h1 span{transition:color .3s}
#main{max-width:660px;margin:0 auto;padding:14px 14px 80px}
#navtabs{display:flex;gap:0;margin-bottom:18px;background:#13131a;border-radius:12px;padding:4px;border:1px solid #1c1c26}
.nvtab{flex:1;border-radius:9px;padding:9px 4px;cursor:pointer;font-family:"Barlow Condensed";font-weight:700;font-size:11px;letter-spacing:1px;text-align:center;text-transform:uppercase;color:#444;transition:all .2s;border:none;background:none}
.nvtab.on{background:#1e1e2a;color:#fff}
#tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{border-radius:10px;padding:7px 11px;cursor:pointer;font-family:"Barlow Condensed";font-weight:700;font-size:10px;letter-spacing:1px;white-space:nowrap;text-transform:uppercase;border:2px solid #222;background:#16161e;color:#666;transition:all .2s;flex-shrink:0}
.tab.on{color:#000;transform:translateY(-2px)}
.tabem{font-size:14px;display:block;margin-bottom:2px}
#daycard{border-radius:14px;padding:16px 18px;margin-bottom:14px;transition:background .3s,border-color .3s}
.dlbl{font-size:10px;letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.dtitle{font-size:clamp(20px,6vw,30px);font-weight:900;letter-spacing:2px;text-transform:uppercase}
.dfocus{font-size:12px;color:#666;font-family:"Barlow";margin-top:3px}
.dem{font-size:40px}
#wcg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.wcc{background:#13131a;border-radius:11px;padding:12px}
.wlbl{font-size:9px;letter-spacing:3px;font-weight:700;margin-bottom:4px;text-transform:uppercase}
.wname{font-size:13px;font-weight:700;margin-bottom:2px}
.wreps{font-size:14px;font-weight:900;margin-bottom:2px}
.wnote{font-size:10px;color:#555;font-family:"Barlow";line-height:1.4}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.slbl{font-size:10px;letter-spacing:3px;color:#555;font-weight:700;text-transform:uppercase}
.shint{font-size:9px;color:#2a2a2a;font-family:"Barlow";letter-spacing:1px;text-transform:uppercase}
.exlist{display:flex;flex-direction:column;gap:3px;margin-bottom:14px}
.exrow{border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.exrow.open{border-radius:10px 10px 0 0}
.extop{display:flex;align-items:center;padding:10px 9px;gap:10px}
.exnum{width:25px;height:25px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.exinfo{flex:1;min-width:0}
.exname{font-size:13px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.exnote{font-size:10px;color:#555;font-family:"Barlow";margin-top:1px}
.exright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.exsets{font-size:11px;font-weight:700;text-align:right}
.exarr{font-size:11px;color:#222;transition:transform .2s,color .2s}
.exarr.open{transform:rotate(180deg)}
.exhow{background:#0c0c16;border-radius:0 0 10px 10px;padding:12px 12px 14px 12px;border-top:none}
.howlbl{font-size:9px;letter-spacing:3px;font-weight:700;margin-bottom:6px;text-transform:uppercase}
.howtxt{font-size:12px;color:#aaa;font-family:"Barlow";line-height:1.75}
.bdg{font-size:9px;font-family:"Barlow";font-weight:700;border-radius:4px;padding:2px 5px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.bboard{background:rgba(255,200,0,.1);color:#ffc800;border:1px solid rgba(255,200,0,.2)}
.bweight{background:rgba(100,180,255,.1);color:#64b4ff;border:1px solid rgba(100,180,255,.2)}
.bpull{background:rgba(160,100,255,.1);color:#b47dff;border:1px solid rgba(160,100,255,.2)}
.bburnout{background:rgba(255,60,60,.12);color:#ff5050;border:1px solid rgba(255,60,60,.25)}
.stretchgrid{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.stretchcard{background:#13131a;border-radius:11px;padding:13px 14px;border:1px solid #1c1c26}
.stname{font-size:13px;font-weight:700;letter-spacing:.3px;margin-bottom:3px}
.sttime{font-size:11px;font-weight:900;margin-bottom:4px}
.sthow{font-size:11px;color:#666;font-family:"Barlow";line-height:1.55}
.banner{border-radius:11px;padding:11px 13px;margin-bottom:9px;display:flex;align-items:center;gap:10px}
.banico{font-size:20px;flex-shrink:0}
.bantit{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.bansub{font-size:10px;font-family:"Barlow";margin-top:1px;color:#666}
#cooldown{background:#0e0e15;border:1px solid #1c1c24;border-radius:11px;padding:12px 13px;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.cdlbl{font-size:9px;letter-spacing:3px;color:#444;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.cdtxt{font-size:12px;font-family:"Barlow";color:#666}
#footer{margin-top:18px;padding:12px;border-radius:11px;background:#0e0e15;border:1px solid #181820;text-align:center;font-size:9px;color:#333;font-family:"Barlow";letter-spacing:2px;text-transform:uppercase}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .25s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2.2s infinite}
.progbox{border-radius:12px;padding:12px 13px;margin-bottom:13px}
.progtitle{font-size:10px;letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.progrow{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:10px;font-family:"Barlow";border-radius:20px;padding:4px 9px;border:1px solid #222;background:#111;color:#444;cursor:pointer;transition:all .2s}
.pill.done{color:#555;border-color:#2a2a2a;text-decoration:line-through}
.pill.cur{font-weight:700;color:#000}
#motbanner{border-radius:13px;padding:14px 16px;margin-bottom:16px;border:1px solid #222;background:#0e0e18;display:flex;gap:12px;align-items:flex-start}
.motday{font-size:9px;letter-spacing:3px;font-weight:700;text-transform:uppercase;color:#444;margin-bottom:4px}
.motquote{font-size:15px;font-weight:800;letter-spacing:.5px;line-height:1.3;text-transform:uppercase}
.motsub{font-size:11px;font-family:"Barlow";color:#555;margin-top:5px;line-height:1.5}
.motico{font-size:28px;flex-shrink:0;margin-top:2px}
.trk-week{background:#13131a;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1c1c26}
.trk-wtitle{font-size:10px;letter-spacing:3px;font-weight:700;text-transform:uppercase;color:#444;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.trk-clr{font-size:9px;color:#333;cursor:pointer;font-family:"Barlow";letter-spacing:1px;padding:3px 8px;border:1px solid #222;border-radius:6px}
.trk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.trk-item{background:#0e0e15;border-radius:9px;padding:10px 11px;border:1px solid #181820}
.trk-label{font-size:9px;letter-spacing:2px;font-weight:700;text-transform:uppercase;color:#444;margin-bottom:6px}
.trk-input{background:none;border:none;border-bottom:1px solid #2a2a2a;color:#fff;font-family:"Barlow Condensed";font-size:20px;font-weight:900;width:100%;outline:none;padding:2px 0;margin-bottom:2px}
.trk-prev{font-size:9px;font-family:"Barlow";color:#333}
.trk-up{color:#4cff91}
.trk-dn{color:#ff5050}
.trk-eq{color:#555}
.trk-addwk{width:100%;padding:11px;border-radius:10px;background:#13131a;border:1px solid #1c1c26;color:#444;font-family:"Barlow Condensed";font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:16px}
.trk-empty{text-align:center;padding:40px 20px;color:#333;font-family:"Barlow";font-size:12px;letter-spacing:1px;line-height:1.8}
</style>
</head>
<body>
<div id="hdr">
  <div id="hdr-in">
    <div class="tagrow"><span class="tag" id="htag">7-Day Program</span><span class="sub">Age 14 · 122 lbs</span></div>
    <h1>Height. Muscle. Strength. <span id="hacc">Lets Go.</span></h1>
  </div>
</div>
<div id="main">
  <div id="navtabs">
    <button class="nvtab on" onclick="showTab('workout')">💪 Workout</button>
    <button class="nvtab" onclick="showTab('tracker')">📈 Progress</button>
    <button class="nvtab" onclick="showTab('motivation')">🔥 Motivation</button>
  </div>

  <!-- WORKOUT -->
  <div id="workout">
    <div id="tabs"></div>
    <div id="motbanner"></div>
    <div id="daycard">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="dlbl" id="dday"></div><div class="dtitle" id="dtitle"></div><div class="dfocus" id="dfocus"></div></div>
        <div class="dem" id="dem"></div>
      </div>
    </div>
    <div id="wcg">
      <div class="wcc"><div class="wlbl" style="color:#FFD700">Warmup</div><div class="wname" id="wuname"></div><div class="wreps" id="wureps" style="color:#FFD700"></div><div class="wnote" id="wunote"></div></div>
      <div class="wcc"><div class="wlbl" style="color:#00E5FF">Cardio</div><div class="wname" id="caname"></div><div class="wreps" id="careps" style="color:#00E5FF"></div><div class="wnote" id="canote"></div></div>
    </div>
    <div id="progbox"></div>
    <div id="pullsection"><div class="shdr"><div class="slbl" id="pullslbl">Pull-Up Practice</div><div class="shint">Tap to expand</div></div><div class="exlist" id="pullpraclist"></div></div>
    <div id="pushsection"><div class="shdr"><div class="slbl" id="pushslbl">Push-Up Board Work</div><div class="shint">Tap to expand</div></div><div class="exlist" id="pushlist"></div></div>
    <div class="shdr"><div class="slbl">Main Workout</div><div class="shint">Tap to expand</div></div>
    <div class="exlist" id="exlist"></div>
    <div class="shdr" id="strhdr" style="display:none"><div class="slbl" id="strlbl">Stretches</div></div>
    <div class="stretchgrid" id="strlist"></div>
    <div id="cooldown"><span style="font-size:19px">🧊</span><div><div class="cdlbl">Cool Down</div><div class="cdtxt" id="cdtxt"></div></div></div>
    <div id="footer"><span class="pulse">Log every rep · Sleep 9-10 hrs · Beat last week by 1 rep</span></div>
  </div>

  <!-- TRACKER -->
  <div id="tracker" style="display:none">
    <div style="font-size:10px;letter-spacing:3px;color:#444;font-weight:700;text-transform:uppercase;margin-bottom:12px">Weekly Progress Log</div>
    <button class="trk-addwk" onclick="addWeek()">+ Add This Week</button>
    <div id="trkweeks"></div>
  </div>

  <!-- MOTIVATION -->
  <div id="motivation" style="display:none">
    <div style="font-size:10px;letter-spacing:3px;color:#444;font-weight:700;text-transform:uppercase;margin-bottom:14px">Daily Fuel</div>
    <div id="motfull"></div>
  </div>
</div>

<script>
/* NAV */
function showTab(t){
  ['workout','tracker','motivation'].forEach(function(id){
    document.getElementById(id).style.display=id===t?'':'none';
  });
  document.querySelectorAll('.nvtab').forEach(function(n,i){
    n.classList.toggle('on',['workout','tracker','motivation'][i]===t);
  });
  if(t==='tracker')renderTracker();
  if(t==='motivation')renderMotFull();
}

/* MOTIVATION */
var QUOTES=[
  {icon:'🔥',q:'Every rep you do today is a rep nobody can take away from you.',s:'The work adds up. You just can\'t see it yet. Keep going.'},
  {icon:'💪',q:'You don\'t have to be the strongest. You just have to show up.',s:'Showing up every day beats being talented but lazy every single time.'},
  {icon:'📈',q:'One more rep than last week. That\'s the whole game.',s:'You don\'t need a huge jump. Just be slightly better than yesterday.'},
  {icon:'🧠',q:'Your arms are tired but your mind quits first.',s:'When it burns and you want to stop — that\'s the exact moment the muscle starts growing.'},
  {icon:'🏆',q:'Nobody starts this at 14. That\'s your advantage.',s:'You\'re building something most people won\'t start until they\'re 25. You\'re already ahead.'},
  {icon:'😤',q:'The bar doesn\'t care how you feel today.',s:'Do it anyway. Bad workout days still build muscle. Skipping does nothing.'},
  {icon:'🚀',q:'Pull-ups are hard for everyone at first. Then one day they\'re not.',s:'Every negative, every hang is getting you there. Trust the process.'},
  {icon:'⚡',q:'Soreness means it worked.',s:'If your chest is sore after chest day you did it right. Rest, eat, sleep, come back stronger.'},
  {icon:'🦅',q:'The version of you in 6 months is watching right now.',s:'Will he be proud of what you did today? Make sure the answer is yes.'},
  {icon:'💡',q:'Strength is just patience and reps.',s:'Nobody gets strong fast. They just never stopped. That\'s your advantage — you started young.'}
];

function hexRgb(c){var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return r+','+g+','+b;}
function ha(c,a){return'rgba('+hexRgb(c)+','+a+')';}

function renderMotBanner(col){
  var q=QUOTES[new Date().getDay()%QUOTES.length];
  var el=document.getElementById('motbanner');
  el.style.borderColor='rgba('+hexRgb(col)+',0.2)';
  el.style.background='rgba('+hexRgb(col)+',0.04)';
  el.innerHTML='<div class="motico">'+q.icon+'</div><div><div class="motday" style="color:'+col+'">Today\'s fuel</div><div class="motquote" style="color:'+col+'">'+q.q+'</div><div class="motsub">'+q.s+'</div></div>';
}

function renderMotFull(){
  var cols=['#FF4D4D','#FF8C00','#FFD700','#00C853','#00B0FF','#7C4DFF','#F06292','#00E5FF','#FF4D4D','#00C853'];
  var h='';
  QUOTES.forEach(function(q,i){
    var c=cols[i%cols.length];
    h+='<div style="background:#13131a;border-radius:13px;padding:15px 16px;margin-bottom:10px;border:1px solid rgba('+hexRgb(c)+',0.18)">';
    h+='<div style="font-size:24px;margin-bottom:8px">'+q.icon+'</div>';
    h+='<div style="font-size:14px;font-weight:800;letter-spacing:.5px;color:'+c+';text-transform:uppercase;line-height:1.3;margin-bottom:6px">'+q.q+'</div>';
    h+='<div style="font-size:11px;font-family:Barlow;color:#555;line-height:1.55">'+q.s+'</div></div>';
  });
  document.getElementById('motfull').innerHTML=h;
}

/* TRACKER */
var TRK_KEYS=['Pull-Ups','Floor Push-Ups','Wide Push-Ups','Dead Hang (sec)','Plank (sec)','Chin-Ups'];
function loadWeeks(){try{return JSON.parse(localStorage.getItem('wklog')||'[]');}catch(e){return[];}}
function saveWeeks(w){localStorage.setItem('wklog',JSON.stringify(w));}

function addWeek(){
  var weeks=loadWeeks();
  var entry={week:weeks.length+1,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),vals:{}};
  TRK_KEYS.forEach(function(k){entry.vals[k]='';});
  weeks.push(entry);saveWeeks(weeks);renderTracker();
}

function clearWeek(i){
  var weeks=loadWeeks();weeks.splice(i,1);
  for(var j=0;j<weeks.length;j++)weeks[j].week=j+1;
  saveWeeks(weeks);renderTracker();
}

function updateVal(wi,key,val){
  var weeks=loadWeeks();
  if(weeks[wi])weeks[wi].vals[key]=val;
  saveWeeks(weeks);
}

function renderTracker(){
  var weeks=loadWeeks();
  var el=document.getElementById('trkweeks');
  if(!weeks.length){
    el.innerHTML='<div class="trk-empty">No weeks logged yet.<br><br>Hit "+ Add This Week" then fill in your numbers after each session.<br><br>Green arrow = you improved. That\'s the goal every week.</div>';
    return;
  }
  var h='';
  for(var i=weeks.length-1;i>=0;i--){
    var w=weeks[i],prev=i>0?weeks[i-1]:null;
    h+='<div class="trk-week"><div class="trk-wtitle"><span>Week '+w.week+' &nbsp;·&nbsp; '+w.date+'</span><span class="trk-clr" onclick="clearWeek('+i+')">Remove</span></div><div class="trk-grid">';
    TRK_KEYS.forEach(function(key){
      var cur=w.vals[key]||'',prevVal=prev?prev.vals[key]:'',arrow='';
      if(cur!==''&&prevVal!==''){
        var cn=parseFloat(cur),pn=parseFloat(prevVal);
        if(cn>pn)arrow='<span class="trk-up">▲ +'+Math.round((cn-pn)*10)/10+'</span>';
        else if(cn<pn)arrow='<span class="trk-dn">▼ '+Math.round((cn-pn)*10)/10+'</span>';
        else arrow='<span class="trk-eq">— same</span>';
      }
      h+='<div class="trk-item"><div class="trk-label">'+key+'</div>';
      h+='<input class="trk-input" type="number" inputmode="numeric" placeholder="—" value="'+cur+'" onchange="updateVal('+i+',\''+key+'\',this.value)" />';
      if(arrow)h+='<div class="trk-prev">'+arrow+(prevVal?' vs '+prevVal:'')+'</div>';
      else if(prevVal)h+='<div class="trk-prev" style="color:#333">Last: '+prevVal+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }
  el.innerHTML=h;
}

/* WORKOUT DATA */
function bdg(t){
  if(!t)return'';
  var m={board:'<span class="bdg bboard">Board</span>',weight:'<span class="bdg bweight">5lb</span>',pull:'<span class="bdg bpull">Pull-Up</span>',burnout:'<span class="bdg bburnout">Burnout</span>'};
  return m[t]||'';
}

function mkList(arr,exp,pfx,col){
  var h='';
  for(var i=0;i<arr.length;i++){
    var e=arr[i],open=(exp===i);
    var rs=open?'background:'+ha(col,.05)+';border-color:'+ha(col,.24)+';':'';
    h+='<div id="'+pfx+i+'"><div class="exrow'+(open?' open':'')+'" onclick="tog(\''+pfx+'\','+i+')" style="'+rs+'">';
    h+='<div class="extop"><div class="exnum" style="background:'+ha(col,.13)+';border:1px solid '+ha(col,.3)+';color:'+col+'">'+(i+1)+'</div>';
    h+='<div class="exinfo"><div class="exname">'+e.name+' '+bdg(e.badge)+'</div><div class="exnote">'+e.note+'</div></div>';
    h+='<div class="exright"><div class="exsets" style="color:'+col+'">'+e.sets+' x '+e.reps+'</div>';
    h+='<div class="exarr'+(open?' open':'')+'" style="'+(open?'color:'+col:'')+'">\u25bc</div></div></div></div>';
    if(open)h+='<div class="exhow" style="border:1px solid '+ha(col,.22)+';border-top:none"><div class="howlbl" style="color:'+col+'">How To</div><div class="howtxt">'+e.how+'</div></div>';
    h+='</div>';
  }
  return h;
}

function mkStretches(arr,col){
  var h='';
  arr.forEach(function(s){
    h+='<div class="stretchcard" style="border-color:'+ha(col,.25)+'"><div class="stname" style="color:'+col+'">'+s.name+'</div><div class="sttime" style="color:'+col+'">'+s.time+'</div><div class="sthow">'+s.how+'</div></div>';
  });
  return h;
}

var pullLv=parseInt(localStorage.getItem('pull')||'0');
function setPull(i){pullLv=i;localStorage.setItem('pull',i);render();}

function mkPullProg(c){
  var steps=['Dead Hang Hold','Scapular Pull','Band Assisted','Jumping Slow Lower','Negative Pull-Up','Half Pull-Up','Full Pull-Up','Chin-Up','Chest to Bar'];
  var pills='';
  steps.forEach(function(s,i){
    var cl='pill'+(i<pullLv?' done':i===pullLv?' cur':'');
    var st=i===pullLv?'background:'+c+';border-color:'+c+';':'';
    pills+='<span class="'+cl+'" style="'+st+'" onclick="setPull('+i+')">'+(i<pullLv?'✓ ':i===pullLv?'▶ ':'')+s+'</span>';
  });
  return'<div class="progbox" style="background:'+ha(c,.06)+';border:1px solid '+ha(c,.2)+'"><div class="progtitle" style="color:'+c+'">Pull-Up Ladder — tap your current level</div><div class="progrow">'+pills+'</div></div>';
}

var HEIGHT_STRETCHES=[
  {name:'Dead Hang',time:'3 sets · 30 sec',how:'Jump and hang from a bar. Go completely loose. Let gravity pull you down. Best thing you can do for your spine and height every single day.'},
  {name:'Cobra',time:'3 sets · 30 sec',how:'Lie face down, hands under shoulders. Press your chest up off the floor and look up. Keep hips on the ground. Hold and breathe.'},

var expEx=null,expPush=null,expPull=null,activeDay=0;

function renderTabs(){
  var h='';
  DAYS.forEach(function(d,i){
    var on=i===activeDay;
    var st=on?'background:'+d.color+';color:#000;border-color:'+d.color+';':'';
    h+='<button class="tab'+(on?' on':'')+'" onclick="selDay('+i+')" style="'+st+'"><span class="tabem">'+d.emoji+'</span>'+d.day+'</button>';
  });
  document.getElementById('tabs').innerHTML=h;
}

function render(){
  var d=DAYS[activeDay],c=d.color,di=activeDay;
  document.getElementById('hdr').style.cssText='border-bottom:3px solid '+c+';background:'+ha(c,.07);
  document.getElementById('htag').style.color=c;
  document.getElementById('hacc').style.color=c;
  var card=document.getElementById('daycard');
  card.style.background='linear-gradient(135deg,'+ha(c,.09)+' 0%,#13131a 100%)';
  card.style.border='1px solid '+ha(c,.27);
  document.getElementById('dday').textContent=d.day;
  document.getElementById('dday').style.color=c;
  document.getElementById('dtitle').textContent=d.label;
  document.getElementById('dfocus').textContent=d.focus;
  document.getElementById('dem').textContent=d.emoji;
  document.getElementById('wuname').textContent=d.warmup.name;
  document.getElementById('wureps').textContent=d.warmup.reps;
  document.getElementById('wunote').textContent=d.warmup.note;
  document.getElementById('caname').textContent=d.cardio.name;
  document.getElementById('careps').textContent=d.cardio.reps;
  document.getElementById('canote').textContent=d.cardio.note;

  renderMotBanner(c);

  var pullDays=[1,2,4,5,6];
  document.getElementById('progbox').innerHTML=pullDays.indexOf(di)>=0?mkPullProg(c):'';

  var pullSec=document.getElementById('pullsection');
  var ppd=PULL_PRACTICE[di];
  if(d.hasPullPrac&&ppd){
    pullSec.style.display='';
    var pc=ppd.col;
    var pb='<div class="banner" style="background:linear-gradient(135deg,'+ha(pc,.09)+' 0%,#0e0e18 100%);border:1px solid '+ha(pc,.3)+';margin-bottom:9px"><div class="banico">🏋️</div><div><div class="bantit" style="color:'+pc+'">'+ppd.banner+'</div><div class="bansub">'+ppd.sub+'</div></div></div>';
    document.getElementById('pullslbl').style.color=pc;
    document.getElementById('pullpraclist').innerHTML=pb+mkList(ppd.ex,expPull,'pp',pc);
  }else{pullSec.style.display='none';}

  var pd=PUSH_DAILY[di];
  var pushSec=document.getElementById('pushsection');
  if(pd){
    pushSec.style.display='';
    var bc=pd.col;
    var pb2='<div class="banner" style="background:linear-gradient(135deg,'+ha(bc,.09)+' 0%,#0e0e18 100%);border:1px solid '+ha(bc,.3)+';margin-bottom:9px"><div class="banico">💥</div><div><div class="bantit" style="color:'+bc+'">'+pd.banner+'</div><div class="bansub">'+pd.sub+'</div></div></div>';
    document.getElementById('pushslbl').style.color=bc;
    document.getElementById('pushlist').innerHTML=pb2+mkList(pd.ex,expPush,'pu',bc);
  }else{pushSec.style.display='none';}

  document.getElementById('exlist').innerHTML=mkList(d.exercises,expEx,'ex',c);

  var stretches=HEIGHT_STRETCHES.slice();
  var strLabel='Stretches';
  if(d.pushStretches){stretches=PUSH_STRETCHES.concat(stretches);strLabel='Post-Push + Height Stretches';}
  document.getElementById('strhdr').style.display='';
  document.getElementById('strlbl').textContent=strLabel;
  document.getElementById('strlbl').style.color=c;
  document.getElementById('strlist').innerHTML=mkStretches(stretches,c);
  document.getElementById('cdtxt').textContent=d.cooldown;
}

function selDay(i){
  activeDay=i;expEx=null;expPush=null;expPull=null;
  renderTabs();render();
  var card=document.getElementById('daycard');
  card.classList.remove('fu');void card.offsetWidth;card.classList.add('fu');
  window.scrollTo({top:0,behavior:'smooth'});
}

function tog(pfx,i){
  if(pfx==='ex')expEx=expEx===i?null:i;
  else if(pfx==='pu')expPush=expPush===i?null:i;
  else if(pfx==='pp')expPull=expPull===i?null:i;
  render();
  var id=pfx+i;
  setTimeout(function(){
    var el=document.getElementById(id);
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}

renderTabs();
render();
</script>
