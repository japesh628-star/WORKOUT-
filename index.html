<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>My Workout</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#fff;font-family:"Barlow Condensed",sans-serif;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
#hdr{position:sticky;top:0;z-index:100;padding:env(safe-area-inset-top,0px) 16px 14px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:border-color .3s,background .3s}
#hdr-in{max-width:660px;margin:0 auto;padding-top:12px}
.tagrow{display:flex;align-items:baseline;gap:10px;margin-bottom:3px}
.tag{font-size:10px;letter-spacing:4px;font-weight:700;text-transform:uppercase;transition:color .3s}
.sub{font-size:10px;letter-spacing:2px;color:#444}
h1{font-size:clamp(17px,5vw,30px);font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1.05}
h1 span{transition:color .3s}
#main{max-width:660px;margin:0 auto;padding:14px 14px 80px}
#tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{border-radius:10px;padding:7px 11px;cursor:pointer;font-family:"Barlow Condensed";font-weight:700;font-size:10px;letter-spacing:1px;white-space:nowrap;text-transform:uppercase;border:2px solid #222;background:#16161e;color:#666;transition:all .2s;flex-shrink:0}
.tab.on{color:#000;transform:translateY(-2px)}
.tabem{font-size:14px;display:block;margin-bottom:2px}
#daycard{border-radius:14px;padding:16px 18px;margin-bottom:14px;transition:background .3s,border-color .3s}
.dlbl{font-size:10px;letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.dtitle{font-size:clamp(20px,6vw,30px);font-weight:900;letter-spacing:2px;text-transform:uppercase}
.dfocus{font-size:12px;color:#666;font-family:"Barlow";margin-top:3px}
.dem{font-size:40px}
#wcg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.wcc{background:#13131a;border-radius:11px;padding:12px}
.wlbl{font-size:9px;letter-spacing:3px;font-weight:700;margin-bottom:4px;text-transform:uppercase}
.wname{font-size:13px;font-weight:700;margin-bottom:2px}
.wreps{font-size:14px;font-weight:900;margin-bottom:2px}
.wnote{font-size:10px;color:#555;font-family:"Barlow";line-height:1.4}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.slbl{font-size:10px;letter-spacing:3px;color:#555;font-weight:700;text-transform:uppercase}
.shint{font-size:9px;color:#2a2a2a;font-family:"Barlow";letter-spacing:1px;text-transform:uppercase}
.exlist{display:flex;flex-direction:column;gap:3px;margin-bottom:14px}
.exrow{border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.exrow.open{border-radius:10px 10px 0 0}
.extop{display:flex;align-items:center;padding:10px 9px;gap:10px}
.exnum{width:25px;height:25px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.exinfo{flex:1;min-width:0}
.exname{font-size:13px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.exnote{font-size:10px;color:#555;font-family:"Barlow";margin-top:1px}
.exright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.exsets{font-size:11px;font-weight:700;text-align:right}
.exarr{font-size:11px;color:#222;transition:transform .2s,color .2s}
.exarr.open{transform:rotate(180deg)}
.exhow{background:#0c0c16;border-radius:0 0 10px 10px;padding:12px 12px 14px 12px;border-top:none}
.howlbl{font-size:9px;letter-spacing:3px;font-weight:700;margin-bottom:6px;text-transform:uppercase}
.howtxt{font-size:12px;color:#aaa;font-family:"Barlow";line-height:1.75}
.bdg{font-size:9px;font-family:"Barlow";font-weight:700;border-radius:4px;padding:2px 5px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.bboard{background:rgba(255,200,0,.1);color:#ffc800;border:1px solid rgba(255,200,0,.2)}
.bweight{background:rgba(100,180,255,.1);color:#64b4ff;border:1px solid rgba(100,180,255,.2)}
.bpull{background:rgba(160,100,255,.1);color:#b47dff;border:1px solid rgba(160,100,255,.2)}
.stretchgrid{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.stretchcard{background:#13131a;border-radius:11px;padding:13px 14px;border:1px solid #1c1c26}
.stname{font-size:13px;font-weight:700;letter-spacing:.3px;margin-bottom:3px}
.sttime{font-size:11px;font-weight:900;margin-bottom:4px}
.sthow{font-size:11px;color:#666;font-family:"Barlow";line-height:1.55}
.banner{border-radius:11px;padding:11px 13px;margin-bottom:9px;display:flex;align-items:center;gap:10px}
.banico{font-size:20px;flex-shrink:0}
.bantit{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.bansub{font-size:10px;font-family:"Barlow";margin-top:1px;color:#666}
#cooldown{background:#0e0e15;border:1px solid #1c1c24;border-radius:11px;padding:12px 13px;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.cdlbl{font-size:9px;letter-spacing:3px;color:#444;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.cdtxt{font-size:12px;font-family:"Barlow";color:#666}
#footer{margin-top:18px;padding:12px;border-radius:11px;background:#0e0e15;border:1px solid #181820;text-align:center;font-size:9px;color:#333;font-family:"Barlow";letter-spacing:2px;text-transform:uppercase}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .25s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2.2s infinite}
/* Pull-up progress pills */
.progbox{border-radius:12px;padding:12px 13px;margin-bottom:13px}
.progtitle{font-size:10px;letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.progrow{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:10px;font-family:"Barlow";border-radius:20px;padding:4px 9px;border:1px solid #222;background:#111;color:#444;cursor:pointer;transition:all .2s}
.pill.done{color:#555;border-color:#2a2a2a;text-decoration:line-through}
.pill.cur{font-weight:700;color:#000}
</style>
</head>
<body>
<div id="hdr">
  <div id="hdr-in">
    <div class="tagrow"><span class="tag" id="htag">7-Day Program</span><span class="sub">Age 14 · 122 lbs</span></div>
    <h1>Height. Muscle. Strength. <span id="hacc">Lets Go.</span></h1>
  </div>
</div>
<div id="main">
  <div id="tabs"></div>
  <div id="daycard">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div class="dlbl" id="dday"></div><div class="dtitle" id="dtitle"></div><div class="dfocus" id="dfocus"></div></div>
      <div class="dem" id="dem"></div>
    </div>
  </div>
  <div id="wcg">
    <div class="wcc">
      <div class="wlbl" style="color:#FFD700">Warmup</div>
      <div class="wname" id="wuname"></div><div class="wreps" id="wureps" style="color:#FFD700"></div><div class="wnote" id="wunote"></div>
    </div>
    <div class="wcc">
      <div class="wlbl" style="color:#00E5FF">Cardio</div>
      <div class="wname" id="caname"></div><div class="wreps" id="careps" style="color:#00E5FF"></div><div class="wnote" id="canote"></div>
    </div>
  </div>
  <div id="progbox"></div>
  <div id="pullsection">
    <div class="shdr"><div class="slbl" id="pullslbl">Pull-Up Practice</div><div class="shint">Tap to expand</div></div>
    <div class="exlist" id="pullpraclist"></div>
  </div>
  <div id="pushsection">
    <div class="shdr"><div class="slbl" id="pushslbl">Push-Up Board Work</div><div class="shint">Tap to expand</div></div>
    <div class="exlist" id="pushlist"></div>
  </div>
  <div class="shdr"><div class="slbl">Main Workout</div><div class="shint">Tap to expand</div></div>
  <div class="exlist" id="exlist"></div>
  <div class="shdr" id="strhdr" style="display:none"><div class="slbl" id="strlbl">Stretches</div></div>
  <div class="stretchgrid" id="strlist"></div>
  <div id="cooldown">
    <span style="font-size:19px">🧊</span>
    <div><div class="cdlbl">Cool Down</div><div class="cdtxt" id="cdtxt"></div></div>
  </div>
  <div id="footer"><span class="pulse">Track every rep · Sleep 9-10 hrs · Beat last week by 1 rep</span></div>
</div>
<script>
var PULL_STEPS=["Dead Hang Hold","Scapular Pull","Band Assisted","Jumping Slow Lower","Negative Pull-Up","Half Pull-Up","Full Pull-Up","Chin-Up","Chest to Bar"];
var pullLv=parseInt(localStorage.getItem("pull")||"0");
var expEx=null,expPush=null,expPull=null,activeDay=0;

function ha(c,a){var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return"rgba("+r+","+g+","+b+","+a+")";}

function bdg(t){
  if(!t)return"";
  var m={board:'<span class="bdg bboard">Board</span>',weight:'<span class="bdg bweight">5lb</span>',pull:'<span class="bdg bpull">Pull-Up</span>'};
  return m[t]||"";
}

function mkList(arr,exp,pfx,col){
  var h="";
  for(var i=0;i<arr.length;i++){
    var e=arr[i],open=(exp===i);
    var rs=open?"background:"+ha(col,.05)+";border-color:"+ha(col,.24)+";":"";
    h+='<div id="'+pfx+i+'">';
    h+='<div class="exrow'+(open?" open":"")+'" onclick="tog(\''+pfx+'\','+i+')" style="'+rs+'">';
    h+='<div class="extop">';
    h+='<div class="exnum" style="background:'+ha(col,.13)+';border:1px solid '+ha(col,.3)+';color:'+col+'">'+(i+1)+'</div>';
    h+='<div class="exinfo"><div class="exname">'+e.name+' '+bdg(e.badge)+'</div><div class="exnote">'+e.note+'</div></div>';
    h+='<div class="exright"><div class="exsets" style="color:'+col+'">'+e.sets+' x '+e.reps+'</div>';
    h+='<div class="exarr'+(open?" open":"")+'" style="'+(open?"color:"+col:"")+'">\u25bc</div></div>';
    h+='</div></div>';
    if(open){
      h+='<div class="exhow" style="border:1px solid '+ha(col,.22)+';border-top:none">';
      h+='<div class="howlbl" style="color:'+col+'">How To</div>';
      h+='<div class="howtxt">'+e.how+'</div></div>';
    }
    h+='</div>';
  }
  return h;
}

function mkStretches(arr,col){
  var h="";
  for(var i=0;i<arr.length;i++){
    var s=arr[i];
    h+='<div class="stretchcard" style="border-color:'+ha(col,.25)+'">';
    h+='<div class="stname" style="color:'+col+'">'+s.name+'</div>';
    h+='<div class="sttime" style="color:'+col+'">'+s.time+'</div>';
    h+='<div class="sthow">'+s.how+'</div>';
    h+='</div>';
  }
  return h;
}

function mkPullProg(c){
  var lv=pullLv;
  var pills="";
  for(var i=0;i<PULL_STEPS.length;i++){
    var cl="pill"+(i<lv?" done":i===lv?" cur":"");
    var st=i===lv?"background:"+c+";border-color:"+c+";":"";
    var pre=i===lv?"* ":(i<lv?"v ":"");
    pills+='<span class="'+cl+'" style="'+st+'" onclick="setPull('+i+')">'+pre+PULL_STEPS[i]+'</span>';
  }
  return'<div class="progbox" style="background:'+ha(c,.06)+';border:1px solid '+ha(c,.2)+'">'
    +'<div class="progtitle" style="color:'+c+'">Pull-Up Ladder — tap your current level</div>'
    +'<div class="progrow">'+pills+'</div></div>';
}

function setPull(i){pullLv=i;localStorage.setItem("pull",i);render();}

var HEIGHT_STRETCHES=[
  {name:"Dead Hang",time:"3 sets · 20-30 sec",how:"Jump and hang from a bar. Go completely loose. Let gravity pull you down. Best thing you can do for your spine and height every single day."},
  {name:"Cobra",time:"3 sets · 30 sec",how:"Lie face down, hands under shoulders. Press your chest up off the floor and look up. Keep hips on the ground. Hold and breathe."},
  {name:"Hip Flexor Lunge",time:"2 sets · 40 sec each side",how:"Kneel one knee down, other foot forward. Push your hips forward until you feel a stretch in the front of your back hip. Stay tall. Switch sides."},
  {name:"Forward Fold",time:"2 sets · 30 sec",how:"Stand and bend forward at the waist. Let your head and arms hang heavy toward the floor. Bend your knees slightly. Just relax and breathe."},
  {name:"Wall Posture Hold",time:"3 sets · 60 sec",how:"Stand with your heels, butt, back AND head all touching a wall at the same time. Hold it. This fixes your posture so you stand at your actual full height."},
  {name:"Lying Spinal Twist",time:"2 sets · 30 sec each side",how:"Lie on your back, knees bent. Drop both knees to the right while keeping your shoulders flat. Look left. Hold then switch. Do this before bed every night."}
];

var PUSH_STRETCHES=[
  {name:"Chest Doorway Stretch",time:"3 sets · 30 sec",how:"Stand in a doorway. Put both arms on the door frame at shoulder height. Lean your chest forward through the door until you feel a stretch across your chest. Hold."},
  {name:"Cross-Body Shoulder Stretch",time:"2 sets · 20 sec each side",how:"Pull one arm across your chest with your other arm. Keep your shoulder down. Hold until you feel the stretch in the back of your shoulder. Switch sides."},
  {name:"Tricep Stretch",time:"2 sets · 20 sec each side",how:"Raise one arm overhead, bend it so your hand touches your upper back. Use your other hand to gently push the elbow back. Hold. Switch sides."},
  {name:"Wrist Circles",time:"1 set · 10 reps each way",how:"Hold your arms out in front of you. Make slow big circles with both wrists — 10 forward then 10 backward. Keeps wrists healthy for push-up work."}
];

// Pull-up practice sections - shown on Back Day, Arms Day, Power Day, Rest Day
var PULL_PRACTICE={
  1:{col:"#FF8C00",banner:"PULL-UP PRACTICE — Build your way up",sub:"Do this before main workout — fresh muscles work harder",ex:[
    {name:"Dead Hang Hold",sets:"4",reps:"20-30 sec",badge:"pull",note:"Hang loose — grip strength and spine decompression",how:"Jump to bar and hang completely loose. Shoulders relaxed down. Hold as long as you can. Builds grip and decompresses your spine. Do 4 sets with 30 sec rest between."},
    {name:"Scapular Pull",sets:"4",reps:"8-10",badge:"pull",note:"No elbow bend — just squeeze shoulder blades DOWN",how:"Hang from the bar. Without bending your elbows at all, squeeze your shoulder blades DOWN and together. Your body rises an inch. Let them slide back up. Teaches your back how to start a pull-up."},
    {name:"Jumping Pull-Up + Slow Lower",sets:"4",reps:"5-6",badge:"pull",note:"Jump to top — lower in 5 full seconds",how:"Jump so your chin is above the bar. Lower yourself as slowly as possible aiming for 5 full seconds. Fight gravity the whole way down. These slow negatives build pull-up strength faster than anything. 4 sets."},
    {name:"Half Pull-Up Hold",sets:"3",reps:"3-5",badge:"pull",note:"Pull halfway up and HOLD for 3 seconds",how:"Pull yourself halfway up so your elbows are at 90 degrees. Hold that position for 3 seconds. Lower slowly. If you can't get halfway use a chair to assist. Builds the hardest part of the pull-up."}
  ]},
  4:{col:"#00B0FF",banner:"PULL-UP PRACTICE — Arms Day focus",sub:"Fresh arms today — attack these hard",ex:[
    {name:"Dead Hang Hold",sets:"4",reps:"25-35 sec",badge:"pull",note:"Beat last session by 5 seconds",how:"Hang completely loose. Try to beat your last hang time by 5 seconds every session. Write your time down. Grip and spine strength."},
    {name:"Scapular Pull",sets:"3",reps:"10-12",badge:"pull",note:"Controlled — feel your lats firing",how:"Hang. Squeeze shoulder blades down without bending elbows. Slow and controlled. Feel your lats activate. This is what starts every pull-up."},
    {name:"Negative Pull-Up",sets:"4",reps:"4-6",badge:"pull",note:"5 second lower — the best builder there is",how:"Jump so your chin clears the bar. Lower yourself for a full 5 seconds. Do not drop. Fight every inch. 4 sets of 4-6 reps with 90 sec rest between."},
    {name:"Chin-Up Attempt or Assisted",sets:"3",reps:"Max",badge:"pull",note:"Palms facing you — easier than pull-up — try it",how:"Hands shoulder-width, palms facing toward you. Pull your chin above the bar. If you can't do a full one yet, use a chair under your feet to assist. Chin-ups are easier than pull-ups and build the same muscles."}
  ]},
  5:{col:"#7C4DFF",banner:"PULL-UP TEST — Max effort today",sub:"Write down exactly what you do — beat it next week",ex:[
    {name:"Dead Hang Max Hold",sets:"2",reps:"Max time",badge:"pull",note:"Go until you drop — write your time",how:"Hang as long as humanly possible. Write your time. Try to beat it every Power Day. Builds serious grip strength over weeks."},
    {name:"Pull-Up Max Test",sets:"3",reps:"Max — even 1 counts",badge:"pull",note:"Best effort — write every rep down",how:"Give everything you have. If you can't do a full one yet, jump to the top and lower as slowly as possible. Write down exactly what you did every week and try to beat it."},
    {name:"Negative Pull-Up Finisher",sets:"3",reps:"4-5",badge:"pull",note:"After your max test — slow 6 second lowers",how:"After your max test sets, finish with negatives. Jump to the top. Lower in 6 full seconds. These finishing negatives overload the muscle after it's already tired — that's when it grows."}
  ]},
  6:{col:"#F06292",banner:"REST DAY HANG WORK — Light and easy",sub:"Every hang builds height and pull-up strength",ex:[
    {name:"Dead Hang Hold",sets:"5",reps:"20-30 sec",badge:"pull",note:"5 sets today — every hang stretches your spine",how:"Jump and hang completely loose. 5 easy sets. No effort. This is the single best thing you can do for your height on a rest day. Do it while watching TV if you can."},
    {name:"Scapular Pull",sets:"3",reps:"8",badge:"pull",note:"Light and controlled — just keeping the habit",how:"Hang and squeeze shoulder blades down. 3 easy sets. Keeps the muscle memory alive for pull-ups so you stay consistent even on rest days."}
  ]}
};

// Push board + floor push-up sections — days 0, 1, 3, 5
var PUSH_DAILY={
  0:{col:"#FF4D4D",banner:"HEAVY PUSH DAY — Board + Floor",sub:"Main chest day — mix board grips with floor push-ups",ex:[
    {name:"Standard Floor Push-Up",sets:"3",reps:"Max reps",badge:"",note:"Floor — shoulder width — start here every session",how:"Hands shoulder-width on the floor, body in a straight line. Lower chest all the way to the floor and press up. Go until you can't. This is your base — write the number every week and beat it."},
    {name:"Green Grip Push-Up Pectoral",sets:"4",reps:"12-15",badge:"board",note:"Green handles — widest grip — outer chest",how:"Hands on GREEN handles. Lower chest slowly 2 seconds down, elbows flare slightly out. Press back up. Aim for 15 reps. 4 sets — beat last week by 1 rep."},
    {name:"Wide Push-Up on Floor",sets:"3",reps:"8-12",badge:"",note:"Hands wider than shoulders — hits outer chest",how:"Place hands wider than shoulder-width on the floor. Lower your chest between your hands and press back up. Elbows flare out to the sides. Wider hand position means more chest and less tricep."},
    {name:"Yellow Grip Push-Up Shoulder",sets:"4",reps:"8-12",badge:"board",note:"Yellow handles — shoulder width — chest and shoulders",how:"YELLOW handles — standard shoulder-width. Lower chest to board, press up. Hits chest and front shoulders together. Work toward 12 clean reps across all 4 sets."},
    {name:"Close-Grip Floor Push-Up",sets:"3",reps:"6-10",badge:"",note:"Hands closer than shoulder width — triceps and inner chest",how:"Hands on the floor slightly closer than shoulder-width. Elbows stay close to your sides as you lower down. Press back up. This hits your triceps and inner chest without the extreme hand position of a diamond. Drop to knees if needed."},
    {name:"Red Grip Push-Up Lat",sets:"3",reps:"6-10",badge:"board",note:"Red handles — wide grip — deep chest stretch",how:"RED handles. Lower chest letting elbows flare wide. Press back up. Gives a deep outer chest stretch. Build reps slowly over weeks."},
    {name:"Slow Negative Floor Push-Up",sets:"3",reps:"5-8",badge:"",note:"5 seconds DOWN on the floor — no board needed",how:"Hands on the floor shoulder-width. Lower yourself for a full 5 seconds. Lower all the way to the floor. Reset on your knees. You do not push back up. Negatives build strength faster than regular reps."},
    {name:"Negative Push-Up on Yellow",sets:"3",reps:"5-8",badge:"board",note:"5 seconds DOWN on the board — fastest strength builder",how:"YELLOW handles. Lower yourself for 5 full seconds out loud. Use your knees to reset each rep. You do not push back up. Negatives on the board build strength fast."}
  ]},
  3:{col:"#00C853",banner:"HEAVY PUSH DAY — All grips + Floor mix",sub:"Second heavy push day — board colors and floor variations",ex:[
    {name:"Standard Floor Push-Up",sets:"3",reps:"Max reps",badge:"",note:"Floor warm-up — go until failure — write your number",how:"Hands shoulder-width on the floor. Lower chest all the way down and press up. Go until you can't do another rep. Write the number every week and try to beat it."},
    {name:"Green Grip Push-Up Pectoral",sets:"4",reps:"10-15",badge:"board",note:"Green handles — warm up on the board after floor",how:"GREEN handles. 10 to 15 reps at a steady pace. 4 sets."},
    {name:"Wide Push-Up on Floor",sets:"3",reps:"8-12",badge:"",note:"Wide hands on floor — outer chest and stretch",how:"Hands wider than shoulder-width on the floor. Lower chest between your hands pressing elbows out to the sides. Hits your outer chest. Build toward 12 clean reps."},
    {name:"Yellow Grip Push-Up Shoulder",sets:"4",reps:"8-12",badge:"board",note:"Yellow handles — main grip to master",how:"YELLOW handles. Lower chest to board slowly and press up. Work toward 12 clean reps across all 4 sets."},
    {name:"Blue Grip Push-Up Tricep",sets:"4",reps:"5-8",badge:"board",note:"Blue handles — narrowest — hardest — pure triceps",how:"BLUE handles. Hands close together. Elbows point straight BACK not out. Lower and press. 5 reps is solid. Drop to knees if needed. 4 sets."},
    {name:"Close-Grip Floor Push-Up",sets:"3",reps:"6-10",badge:"",note:"Hands closer than shoulder width — tricep finisher",how:"Hands on the floor slightly closer than shoulder-width. Elbows stay close to your sides as you lower. Press back up. After Blue grip your triceps will already be working — this keeps them going without the extreme diamond hand position."},
    {name:"Slow Tempo Yellow",sets:"3",reps:"5-6",badge:"board",note:"4 sec down · hold 1 sec · 2 sec up",how:"YELLOW handles. Lower in 4 seconds. Hold 1 second at the bottom. Press up in 2 seconds. That is 1 rep. Slow tempo builds way more strength than fast reps."}
  ]},
  5:{col:"#7C4DFF",banner:"POWER PUSH DAY — Full ladder + Floor test",sub:"Run every grip and test your floor push-up max",ex:[
    {name:"Standard Floor Push-Up Max Test",sets:"3",reps:"Max — write every rep",badge:"",note:"Floor max test — most important number to track",how:"Hands shoulder-width on the floor. Go all the way to failure. Write the number down after every set. This is your main measure of push-up strength. Try to beat it every Power Day."},

function renderTabs(){
  var h="";
  for(var i=0;i<DAYS.length;i++){
    var d=DAYS[i],on=(i===activeDay);
    var st=on?"background:"+d.color+";color:#000;border-color:"+d.color+";":"";
    h+='<button class="tab'+(on?" on":"")+'" onclick="selDay('+i+')" style="'+st+'">';
    h+='<span class="tabem">'+d.emoji+'</span>'+d.day+'</button>';
  }
  document.getElementById("tabs").innerHTML=h;
}

function render(){
  var d=DAYS[activeDay],c=d.color,di=activeDay;
  document.getElementById("hdr").style.cssText="border-bottom:3px solid "+c+";background:"+ha(c,.07);
  document.getElementById("htag").style.color=c;
  document.getElementById("hacc").style.color=c;
  var card=document.getElementById("daycard");
  card.style.background="linear-gradient(135deg,"+ha(c,.09)+" 0%,#13131a 100%)";
  card.style.border="1px solid "+ha(c,.27);
  document.getElementById("dday").textContent=d.day;
  document.getElementById("dday").style.color=c;
  document.getElementById("dtitle").textContent=d.label;
  document.getElementById("dfocus").textContent=d.focus;
  document.getElementById("dem").textContent=d.emoji;
  document.getElementById("wuname").textContent=d.warmup.name;
  document.getElementById("wureps").textContent=d.warmup.reps;
  document.getElementById("wunote").textContent=d.warmup.note;
  document.getElementById("caname").textContent=d.cardio.name;
  document.getElementById("careps").textContent=d.cardio.reps;
  document.getElementById("canote").textContent=d.cardio.note;

  // Pull-up ladder progress (shown on pull days)
  var pullDays=[1,4,5,6];
  if(pullDays.indexOf(di)>=0){
    document.getElementById("progbox").innerHTML=mkPullProg(c);
  } else {
    document.getElementById("progbox").innerHTML="";
  }

  // Pull-up practice section
  var pullSec=document.getElementById("pullsection");
  var ppd=PULL_PRACTICE[di];
  if(d.hasPullPrac && ppd){
    pullSec.style.display="";
    var pc=ppd.col;
    var pban='<div class="banner" style="background:linear-gradient(135deg,'+ha(pc,.09)+' 0%,#0e0e18 100%);border:1px solid '+ha(pc,.3)+';margin-bottom:9px">'
      +'<div class="banico">🏋️</div>'
      +'<div><div class="bantit" style="color:'+pc+'">'+ppd.banner+'</div><div class="bansub">'+ppd.sub+'</div></div></div>';
    document.getElementById("pullslbl").style.color=pc;
    document.getElementById("pullpraclist").innerHTML=pban+mkList(ppd.ex,expPull,"pp",pc);
  } else {
    pullSec.style.display="none";
  }

  // Push board section
  var pd=PUSH_DAILY[di];
  var pushSec=document.getElementById("pushsection");
  if(pd){
    pushSec.style.display="";
    var boardc=pd.col;
    var pban2='<div class="banner" style="background:linear-gradient(135deg,'+ha(boardc,.09)+' 0%,#0e0e18 100%);border:1px solid '+ha(boardc,.3)+';margin-bottom:9px">'
      +'<div class="banico">💥</div>'
      +'<div><div class="bantit" style="color:'+boardc+'">'+pd.banner+'</div><div class="bansub">'+pd.sub+'</div></div></div>';
    document.getElementById("pushslbl").style.color=boardc;
    document.getElementById("pushlist").innerHTML=pban2+mkList(pd.ex,expPush,"pu",boardc);
  } else {
    pushSec.style.display="none";
  }

  document.getElementById("exlist").innerHTML=mkList(d.exercises,expEx,"ex",c);

  var stretches=HEIGHT_STRETCHES.slice();
  var strLabel="Stretches";
  if(d.pushStretches){
    stretches=PUSH_STRETCHES.concat(stretches);
    strLabel="Post-Push + Height Stretches";
  }
  var strHdr=document.getElementById("strhdr");
  var strLbl=document.getElementById("strlbl");
  strHdr.style.display="";
  strLbl.textContent=strLabel;
  strLbl.style.color=c;
  document.getElementById("strlist").innerHTML=mkStretches(stretches,c);

  document.getElementById("cdtxt").textContent=d.cooldown;
}

function selDay(i){
  activeDay=i;expEx=null;expPush=null;expPull=null;
  renderTabs();render();
  var card=document.getElementById("daycard");
  card.classList.remove("fu");void card.offsetWidth;card.classList.add("fu");
  window.scrollTo({top:0,behavior:"smooth"});
}

function tog(pfx,i){
  var id=pfx+i;
  if(pfx==="ex")expEx=expEx===i?null:i;
  else if(pfx==="pu")expPush=expPush===i?null:i;
  else if(pfx==="pp")expPull=expPull===i?null:i;
  render();
  setTimeout(function(){
    var el=document.getElementById(id);
    if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"});
  },50);
}

renderTabs();
render();
</script>
